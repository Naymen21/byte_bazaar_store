<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>ByteBazaar</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>

<body>

<header id="main-nav">
  <div id="nav-container">

    <div id="brand-logo">
      <img src="images/bytebazaar_logo.png" alt="ByteBazaar Logo">
      <div id="logo-popup">Welcome to ByteBazaar</div>
    </div>

    <nav>
      <ul class="nav-links">
        <li><a href="#">Home</a></li>
        <li><a href="#">Products</a></li>
        <li><a href="#">Cart</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </nav>

  </div>
</header>

<main>
  <h1>ByteBazaar</h1>

  <div id="page-container">

    <div id="product" class="image-grid"></div>

    <div id="cart">
      <div id="cart-total">Total: $0.00</div>
      <div id="cart-items">Customer Order</div>
    </div>

  </div>
</main>

<div id="checkout-overlay" class="hidden">
  <div id="checkout-modal">

    <h2>Checkout</h2>

    <section>
      <h3>Order Summary</h3>
      <div id="checkout-summary"></div>
      <h3 id="checkout-total"></h3>
    </section>

    <section>
      <h3>Delivery Information</h3>
      <input placeholder="Full Name" />
      <input placeholder="Email" />
      <input placeholder="Address" />
      <input placeholder="City" />
      <input placeholder="State" />
      <input placeholder="ZIP Code" />
    </section>

    <section>
      <h3>Payment Information</h3>
      <input placeholder="Name on Card" />
      <input placeholder="Card Number" />

      <div style="display:flex; gap:10px;">
        <input placeholder="Expiry Date" />
        <input placeholder="CVV" />
      </div>
    </section>

    <div class="checkout-buttons">
      <button id="place-order">Complete Order</button>
      <button id="back-cart">Back to Cart</button>
    </div>

  </div>
</div>

</body>
</html>
